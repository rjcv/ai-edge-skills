<script>
window.ai_edge_gallery_get_result = async function (data) {
  try {
    return JSON.stringify({
      result: {
        ok: true,
        received_data: data,
        message: "O script JS está a funcionar."
      }
    });
  } catch (err) {
    return JSON.stringify({
      error: String(err)
    });
  }
};
